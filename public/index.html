<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conference Help Desk</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="16x16" />
  </head>
  <body class="l-site is-paper">
    <a href="#main-content" class="u-off-screen">Skip to main content</a>

    <header id="navigation" class="p-navigation--sliding is-dark">
      <div class="p-navigation__row--25-75">
        <div class="p-navigation__banner">
          <div class="p-navigation__tagged-logo">
            <a class="p-navigation__link" href="/">
              <div class="p-navigation__logo-tag">
                <img class="p-navigation__logo-icon" src="/favicon.svg" alt="" />
              </div>
              <span class="p-navigation__logo-title">Conference Help Desk</span>
            </a>
          </div>
          <a href="#" class="p-navigation__toggle--open" title="menu">Menu</a>
        </div>
        <nav class="p-navigation__nav" aria-label="Help desk">
          <div class="p-navigation__items-wrapper">
            <ul class="p-navigation__items helpdesk-nav-primary" role="menu"></ul>
            <ul class="p-navigation__items helpdesk-nav-secondary" role="menu">
              <li class="p-navigation__item" role="menuitem">
                <a class="p-navigation__link" href="/admin.html">
                  Support login <i class="p-icon--user is-light"></i>
                </a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main id="main-content" class="p-section is-paper">
      <div class="main">
        <section class="p-strip is-deep u-no-padding--bottom homepage-suru-strip--mobile">
          <div class="row">
            <div class="col-6 col-start-large-4">
              <div class="p-block">
                <h1>Select your room</h1>
              </div>
              <div
                id="helpdesk-closed"
                class="p-notification--information u-hide u-sv1"
                role="status"
              >
                <div class="p-notification__content">
                  <p class="p-notification__title">Help desk closed</p>
                  <p class="p-notification__message" id="helpdesk-closed-message"></p>
                </div>
              </div>
              <form
                class="p-search-box helpdesk-home-search"
                id="start-form"
                data-js="home-search-form"
              >
                <label class="u-off-screen" for="room">Conference room</label>
                <select
                  id="room"
                  name="room"
                  class="p-search-box__input"
                  required
                  autocomplete="off"
                >
                  <option value="">Choose a conference room…</option>
                </select>
              </form>
              <div class="p-form__group helpdesk-home-name">
                <label for="participant-name" class="p-form__label">Your name (optional)</label>
                <input
                  type="text"
                  id="participant-name"
                  name="participantName"
                  class="p-form__control"
                  placeholder="e.g. Alex"
                  autocomplete="name"
                />
              </div>
              <div class="helpdesk-hero-cta">
                <button type="submit" form="start-form" class="p-button--positive" id="open-chat-btn">
                  Open chat
                </button>
              </div>
              <div
                id="start-error"
                class="p-notification--negative u-hide u-sv1"
                role="alert"
              >
                <div class="p-notification__content">
                  <p class="p-notification__title">Could not start chat</p>
                  <p class="p-notification__message" id="start-error-text"></p>
                </div>
              </div>
            </div>
          </div>
        </section>
        <div class="u-fixed-width u-no-padding--left u-no-padding--right">
          <div class="p-suru25light" aria-hidden="true"></div>
        </div>
      </div>
    </main>

    <script src="/js/snapcraft-navigation.js" defer></script>
    <script type="module">
      import { initHome } from '/js/participant.js';
      initHome();
    </script>
  </body>
</html>
